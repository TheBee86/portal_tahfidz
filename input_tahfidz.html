        // --- FUNGSI CATATAN SISWA ---
        function inputCatatan(nama) {
            // Template Statis
            const pembuka = "Alhamdulillah ananda mampu mengikuti pembelajaran tahfidz dengan sangat baik. ";
            const penutup = " Mohon pendampingan Bapak dan Ibu agar ananda istiqomah mengaji di rumah.";
            const limitTotal = 360;
            // Menghitung sisa karakter yang tersedia untuk input manual guru
            const sisaKarakter = limitTotal - pembuka.length - penutup.length;

            Swal.fire({
                title: 'CATATAN PERKEMBANGAN',
                background: '#0f172a',
                color: '#fff',
                html: `
                    <div class="text-left">
                        <p class="text-[10px] text-white/40 uppercase tracking-widest mb-1">Nama Siswa:</p>
                        <p class="text-md font-bold text-white mb-4 border-b border-white/10 pb-2">${nama}</p>
                        
                        <label class="text-[9px] text-yellow-400 uppercase font-black tracking-widest">Kualitas Pembelajaran</label>
                        <select id="kualitas" class="swal2-input-custom">
                            <option value="sangat baik">Sangat Baik</option>
                            <option value="baik" selected>Baik</option>
                            <option value="cukup baik">Cukup Baik</option>
                        </select>

                        <div class="flex justify-between items-end mt-4">
                            <label class="text-[9px] text-yellow-400 uppercase font-black tracking-widest">Catatan Khusus</label>
                            <span id="charCount" class="text-[9px] text-white/30 font-mono">0 / ${sisaKarakter}</span>
                        </div>
                        
                        <textarea id="pesanGuru" 
                            class="swal2-input-custom h-24" 
                            maxlength="${sisaKarakter}"
                            placeholder="Tulis catatan tambahan guru di sini..."
                            oninput="document.getElementById('charCount').innerText = this.value.length + ' / ${sisaKarakter}'"></textarea>
                        
                        <p class="text-[8px] text-white/20 italic mt-2 leading-tight">
                            *Total pesan (termasuk template) dibatasi maksimal 360 karakter.
                        </p>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'SIMPAN CATATAN',
                confirmButtonColor: '#ca8a04',
            }).then((result) => {
                if (result.isConfirmed) {
                    const kualitas = document.getElementById('kualitas').value;
                    const pesanGuru = document.getElementById('pesanGuru').value;
                    
                    // Menggabungkan menjadi kalimat utuh sesuai format Pak Tebe
                    const catatanLengkap = `Alhamdulillah ananda mampu mengikuti pembelajaran tahfidz dengan ${kualitas}. ${pesanGuru} Mohon pendampingan Bapak dan Ibu agar ananda istiqomah mengaji di rumah.`;

                    // Validasi akhir keamanan
                    if (catatanLengkap.length > 360) {
                        Swal.fire('Terlalu Panjang', 'Maaf, total catatan melebihi 360 karakter.', 'error');
                        return;
                    }

                    kirimKeSheets({
                        guru: namaGuru,
                        namaSiswa: nama,
                        kelas: kelasDipilih,
                        jenis: "Catatan",
                        catatan: catatanLengkap
                    });
                }
            });
        }
