    <style>
        .btn-kembali {
    color: rgba(255, 255, 255, 0.4);

    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-kembali:hover {
    color: rgba(255, 255, 255, 0.8);
}
        /* Memperbaiki background agar penuh dan tidak belang di bawah */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Mencegah scroll yang bikin belang */
        }
        
        .bg-full {
            background-image: url('bg_login_wali.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Overlay gelap merata ke seluruh layar */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.35); /* Slate-950 transparan */
            z-index: 1;
        }

        /* Kotak Login Transparan Mewah (Glassmorphism) */
        .glass-login { 
    position: relative;
    z-index: 10;
    /* Ganti 0.1 di bawah ini untuk mengatur kepekatan putihnya */
    background: rgba(255, 255, 255, 0.05); 
    
    /* Ganti 25px di bawah ini untuk mengatur tingkat buram kacanya */
    backdrop-filter: blur(10px); 
    -webkit-backdrop-filter: blur(25px);
    
    /* Garis pinggir tipis agar terlihat seperti potongan kaca */
    border: 1px solid rgba(255, 255, 255, 0.15); 
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

        /* Memperhalus tampilan input */
        .input-custom {
            background: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        .input-custom:focus {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
    </style>

                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">PORTAL WALI</h1>

        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition-all">

        </button>
    </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest mt-6">

            </form>
